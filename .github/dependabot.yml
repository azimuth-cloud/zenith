---

version: 2

updates:
updates:
  # Using dependabot for all GHA violates pinning policy
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      # Check for new versions weekly
      interval: weekly
    # Update all actions in a single PR
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - automation
      - gha-update
    # Only allow updates for actions maintained by GitHub
    allow:
      - dependency-name: "actions/*"
      - dependency-name: "github-actions/*"

  # Automatically propose PRs for Python dependencies for each component
  - package-ecosystem: pip
    directory: "/client"
    schedule:
      # Check for new versions daily
      interval: daily
    groups:
      pip-updates:
        patterns: ["*"]
    labels:
      - automation
      - pip-update
      - client
    commit-message:
    # Prefix all commit messages with "pip: "
      prefix: "pip"

  - package-ecosystem: pip
